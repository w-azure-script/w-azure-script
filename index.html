<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script.sec • secure boot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- backgrounds -->
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- main card -->
    <div class="loader-card">

        <!-- domain: Script.sec + version -->
        <div class="domain">
            <h1>Script</h1>
            <span class="tld">.sec</span>
            <span class="version">v2.4.0 · stable</span>
        </div>

        <div class="sub-badge">🔒 zero‑trust architecture  •  <span>SHA‑256 8f3a...c1</span></div>

        <!-- dynamic loading text -->
        <div class="loading-text" id="statusText">
            Establishing secure link<span class="cursor"></span>
        </div>

        <!-- progress bar -->
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="percent-row">
            <span class="eta">⏱ <span id="eta">3.0</span>s</span>
            <span class="num" id="percentDisplay">0%</span>
        </div>

        <!-- ===== LOADER WITH GITHUB LOGO ===== -->
        <div class="loader-wrapper">
            <div class="circle-loader">
                <!-- Rotating scanner ring -->
                <div class="scanner-ring"></div>

                <!-- GitHub Logo -->
                <svg class="github-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
            </div>
        </div>

        <!-- status line -->
        <div class="status-line">
            <span><span class="dot blue"></span><span class="label">state</span> <span class="value" id="stateValue">handshake</span></span>
            <span><span class="dot blue d2"></span><span class="label">cipher</span> <span class="value">TLS 1.3</span></span>
            <span><span class="dot blue d3"></span><span class="label">auth</span> <span class="highlight">✔</span></span>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
